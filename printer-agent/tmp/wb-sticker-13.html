<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>WB Sticker Print</title>
  <style>
    @page { size: auto; margin: 0; }
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }
    img {
      display: block;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
    }
  </style>
</head>
<body>
  <img id="sticker" src="file:///C:/bfc24-wms/printer-agent/tmp/wb-sticker-13.svg" alt="WB sticker" />
  <script>
    (function () {
      const img = document.getElementById("sticker");

      function doPrint() {
        setTimeout(() => {
          try { window.focus(); } catch(e) {}
          try { window.print(); } catch(e) {}
          setTimeout(() => {
            try { window.close(); } catch(e) {}
          }, 1500);
        }, 300);
      }

      if (img.complete) {
        doPrint();
      } else {
        img.onload = doPrint;
        img.onerror = function () {
          document.body.innerHTML = "<div style='padding:20px;font-family:sans-serif'>Ошибка загрузки стикера</div>";
        };
      }
    })();
  </script>
</body>
</html>
