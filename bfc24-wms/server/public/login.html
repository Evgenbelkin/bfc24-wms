<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 WMS — Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #1f2937;
      border-radius: 12px;
      padding: 16px 18px 18px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      font-size: 13px;
      margin-bottom: 10px;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.7);
    }

    .btn-main {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #f9fafb;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-main:hover {
      background: #1d4ed8;
    }

    .status {
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
    }
    .status.error {
      color: #f97373;
    }
    .status.ok {
      color: #6ee7b7;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">BFC24 WMS</div>
  <div class="sub">Вход в систему</div>

  <label for="username">Логин</label>
  <input type="text" id="username" autocomplete="username" value="admin" />

  <label for="password">Пароль</label>
  <input type="password" id="password" autocomplete="current-password" />

  <button class="btn-main" id="btnLogin">Войти</button>

  <div class="status" id="status"></div>
</div>

<script>
  function setStatus(text, type) {
    const el = document.getElementById('status');
    el.textContent = text || '';
    el.classList.remove('error', 'ok');
    if (type) el.classList.add(type);
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      setStatus('Укажи логин и пароль', 'error');
      return;
    }

    setStatus('Вход...', null);

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json().catch(() => null);

      if (!res.ok) {
        console.error('LOGIN ERROR', data);
        setStatus(
          'Ошибка входа: ' + (data && data.error ? data.error : res.status),
          'error'
        );
        return;
      }

      // Ожидаем ответ формата { token, role, user }
      const token = data.token;
      const role  = data.role;
      const user  = data.user || username;

      if (!token) {
        setStatus('Сервер не вернул токен', 'error');
        return;
      }

      localStorage.setItem('wmsToken', token);
      localStorage.setItem('wmsRole',  role  || '');
      localStorage.setItem('wmsUser',  user  || '');

      setStatus('Успешный вход, перенаправление...', 'ok');

      // После логина сразу в меню
      window.location.href = '/menu.html';
    } catch (e) {
      console.error(e);
      setStatus('Ошибка сети: ' + e.message, 'error');
    }
  }

  document.getElementById('btnLogin').addEventListener('click', doLogin);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      doLogin();
    }
  });
</script>

</body>
</html>
