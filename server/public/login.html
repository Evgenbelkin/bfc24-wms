<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 WMS — Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #1f2937;
      border-radius: 12px;
      padding: 16px 18px 18px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      font-size: 13px;
      margin-bottom: 10px;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.7);
    }

    .btn-main {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #f9fafb;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-main:hover {
      background: #1d4ed8;
    }

    .btn-main:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
    }

    .status.error {
      color: #f97373;
    }

    .status.ok {
      color: #6ee7b7;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">BFC24 WMS</div>
  <div class="sub">Вход в систему</div>

  <label for="username">Логин</label>
  <input type="text" id="username" autocomplete="username" value="" />

  <label for="password">Пароль</label>
  <input type="password" id="password" autocomplete="current-password" />

  <button class="btn-main" id="btnLogin">Войти</button>

  <div class="status" id="status"></div>
</div>

<script>
  function setStatus(text, type) {
    const el = document.getElementById('status');
    el.textContent = text || '';
    el.classList.remove('error', 'ok');
    if (type) el.classList.add(type);
  }

  function clearStoredAuth() {
    localStorage.removeItem('token');
    localStorage.removeItem('authToken');
    localStorage.removeItem('wmsToken');
    localStorage.removeItem('wmsRole');
    localStorage.removeItem('wmsUser');
    localStorage.removeItem('seller_token');
    localStorage.removeItem('auth_token');
    localStorage.removeItem('role');
    localStorage.removeItem('user');
    localStorage.removeItem('sellerClientId');

    sessionStorage.removeItem('token');
    sessionStorage.removeItem('authToken');
    sessionStorage.removeItem('seller_token');
    sessionStorage.removeItem('auth_token');
  }

  function saveAuth(data) {
    const token = data.token;
    const user = data.user || {};
    const role = user.role || '';
    const clientId = user.client_id || null;

    localStorage.setItem('token', token);
    localStorage.setItem('authToken', token);
    localStorage.setItem('wmsToken', token);

    localStorage.setItem('wmsRole', role);
    localStorage.setItem('role', role);

    localStorage.setItem('wmsUser', JSON.stringify(user));
    localStorage.setItem('user', JSON.stringify(user));

    if (clientId) {
      localStorage.setItem('sellerClientId', String(clientId));
    } else {
      localStorage.removeItem('sellerClientId');
    }

    sessionStorage.setItem('token', token);
    sessionStorage.setItem('authToken', token);
  }

  function getExistingToken() {
    return (
      localStorage.getItem('token') ||
      localStorage.getItem('authToken') ||
      localStorage.getItem('wmsToken') ||
      sessionStorage.getItem('token') ||
      sessionStorage.getItem('authToken') ||
      ''
    );
  }

  function parseJwt(token) {
    try {
      const parts = String(token || '').split('.');
      if (parts.length < 2) return null;
      const base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
      const padded = base64 + '='.repeat((4 - (base64.length % 4)) % 4);
      return JSON.parse(atob(padded));
    } catch (e) {
      return null;
    }
  }

  function isJwtExpired(payload) {
    if (!payload || !payload.exp) return false;
    const nowSec = Math.floor(Date.now() / 1000);
    return nowSec >= Number(payload.exp);
  }

  function getStoredUser() {
    const raw =
      localStorage.getItem('wmsUser') ||
      localStorage.getItem('user') ||
      '';

    if (!raw) return null;

    try {
      return JSON.parse(raw);
    } catch (e) {
      return null;
    }
  }

  function redirectByRole(token) {
    const jwtData = parseJwt(token);
    const storedUser = getStoredUser();

    if (!jwtData || isJwtExpired(jwtData)) {
      clearStoredAuth();
      return;
    }

    const role =
      jwtData.role ||
      storedUser?.role ||
      localStorage.getItem('wmsRole') ||
      localStorage.getItem('role') ||
      '';

    const clientId =
      jwtData.client_id ||
      storedUser?.client_id ||
      localStorage.getItem('sellerClientId') ||
      '';

    if (role === 'seller') {
      if (clientId) {
        window.location.replace(`/seller-cabinet.html?client_id=${encodeURIComponent(clientId)}`);
      } else {
        window.location.replace('/seller-cabinet.html');
      }
      return;
    }

    window.location.replace('/menu.html');
  }

  async function doLogin() {
    const btn = document.getElementById('btnLogin');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      setStatus('Укажи логин и пароль', 'error');
      return;
    }

    btn.disabled = true;
    setStatus('Вход...', null);

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json().catch(() => null);

      if (!res.ok) {
        console.error('LOGIN ERROR', data);
        setStatus(
          'Ошибка входа: ' + (data && data.error ? data.error : res.status),
          'error'
        );
        return;
      }

      const token = data && data.token;
      if (!token) {
        console.error('LOGIN RESPONSE WITHOUT TOKEN', data);
        setStatus('Сервер не вернул токен', 'error');
        return;
      }

      const payload = parseJwt(token);
      if (!payload || isJwtExpired(payload)) {
        setStatus('Сервер вернул некорректный токен', 'error');
        clearStoredAuth();
        return;
      }

      clearStoredAuth();
      saveAuth(data);

      setStatus('Успешный вход, перенаправление...', 'ok');
      redirectByRole(token);
    } catch (e) {
      console.error(e);
      setStatus('Ошибка сети: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('btnLogin').addEventListener('click', doLogin);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      doLogin();
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    const token = getExistingToken();

    if (!token) return;

    const payload = parseJwt(token);
    if (!payload || isJwtExpired(payload)) {
      clearStoredAuth();
      return;
    }

    redirectByRole(token);
  });
</script>

</body>
</html>
