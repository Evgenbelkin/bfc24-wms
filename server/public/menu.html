<!DOCTYPE html> 
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 WMS — Панель управления</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-main: #f4f7fa;
      --bg-card: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);

      --accent-ops: #2563eb;
      --accent-dir: #475569;
      --accent-mp: #7c3aed;
      --accent-rep: #0891b2;
      --accent-adm: #334155;

      --badge-default-bg: #f1f5f9;
      --badge-default-text: #475569;
      --badge-soon-bg: #fef3c7;
      --badge-soon-text: #92400e;
      --badge-soon-border: #fde68a;
      --badge-new-bg: #dbeafe;
      --badge-new-text: #1d4ed8;
      --badge-new-border: #bfdbfe;
      --badge-tasks-bg: #dcfce7;
      --badge-tasks-text: #166534;
      --badge-tasks-border: #bbf7d0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
    }

    .topbar {
      background: #0f172a;
      color: #f8fafc;
      padding: 0 40px;
      min-height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .topbar-left {
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .topbar-logo {
      background: var(--primary);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      color: white;
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
      flex: 0 0 auto;
    }

    .topbar-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .topbar-status {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex: 0 0 auto;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      min-width: 0;
    }

    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #1e293b;
      border: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cbd5e1;
      font-weight: 800;
      font-size: 13px;
      flex: 0 0 auto;
    }

    .user-text {
      text-align: right;
      min-width: 0;
    }

    #userInfo {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #f8fafc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    #userRoleInfo {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .btn-logout {
      padding: 10px 22px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: transparent;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .btn-logout:hover {
      background: #dc2626;
      border-color: #dc2626;
      color: white;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px;
    }

    .page-head {
      margin-bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      flex-wrap: wrap;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-main);
    }

    .page-subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: var(--text-muted);
      max-width: 760px;
    }

    .page-meta {
      font-size: 12px;
      color: var(--text-muted);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }

    .section {
      margin-bottom: 56px;
    }

    .section-header {
      margin-bottom: 22px;
      padding-left: 4px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 0 6px 0;
    }

    .section-title::after {
      content: "";
      height: 1px;
      background: var(--border);
      flex-grow: 1;
    }

    .section-desc {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    #section-operations .section-title { color: var(--accent-ops); }
    #section-directories .section-title { color: var(--accent-dir); }
    #section-marketplaces .section-title { color: var(--accent-mp); }
    #section-analytics .section-title { color: var(--accent-rep); }
    #section-admin .section-title { color: var(--accent-adm); }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .menu-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px 28px 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      box-shadow: var(--shadow-sm);
      position: relative;
      min-height: 178px;
      overflow: hidden;
    }

    .menu-card:hover {
      border-color: var(--primary);
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
    }

    .menu-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, rgba(37,99,235,0.18), transparent);
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .menu-card:hover::before {
      opacity: 1;
    }

    .menu-card.section-operations { border-left: 4px solid rgba(37,99,235,0.22); }
    .menu-card.section-directories { border-left: 4px solid rgba(71,85,105,0.22); }
    .menu-card.section-marketplaces { border-left: 4px solid rgba(124,58,237,0.22); }
    .menu-card.section-analytics { border-left: 4px solid rgba(8,145,178,0.22); }
    .menu-card.section-admin { border-left: 4px solid rgba(51,65,85,0.22); }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .card-icon {
      font-size: 32px;
      line-height: 1;
      flex: 0 0 auto;
      margin-top: 2px;
    }

    .card-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .card-title-line {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.25;
      min-width: 0;
    }

    .card-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      min-height: 44px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-meta {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 24px;
    }

    .card-module-code {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    .badge {
      font-size: 10px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 8px;
      text-transform: uppercase;
      background: var(--badge-default-bg);
      color: var(--badge-default-text);
      white-space: nowrap;
      border: 1px solid transparent;
      flex: 0 0 auto;
    }

    .badge-soon {
      background: var(--badge-soon-bg);
      color: var(--badge-soon-text);
      border-color: var(--badge-soon-border);
    }

    .badge-new {
      background: var(--badge-new-bg);
      color: var(--badge-new-text);
      border-color: var(--badge-new-border);
    }

    .badge-tasks {
      background: var(--badge-tasks-bg);
      color: var(--badge-tasks-text);
      border-color: var(--badge-tasks-border);
    }

    .card-arrow {
      position: absolute;
      bottom: 24px;
      right: 24px;
      opacity: 0;
      transform: translateX(-12px);
      transition: all 0.22s ease;
      color: var(--primary);
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .menu-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .empty-state {
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 28px;
      color: var(--text-muted);
      font-size: 14px;
      box-shadow: var(--shadow-sm);
    }

    .hidden { display: none !important; }

    @media (max-width: 1200px) {
      .menu-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
      .container { padding: 32px 24px; }
      .topbar { padding: 0 24px; }
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 14px 18px;
        height: auto;
        flex-wrap: wrap;
      }

      .topbar-right {
        gap: 14px;
      }

      .container {
        padding: 24px 16px;
      }

      .page-title {
        font-size: 24px;
      }
    }

    @media (max-width: 768px) {
      .topbar-status { display: none; }
      .user-profile {
        padding: 0;
        border-right: none;
        background: none;
        border: none;
      }
      .user-text { display: none; }
      .menu-grid { grid-template-columns: 1fr; }
      .page-head {
        align-items: flex-start;
      }
      .page-meta {
        white-space: normal;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-brand">
      <div class="topbar-logo">W</div>
      <div class="topbar-info">
        <div class="topbar-title">BFC24 WMS</div>
        <div class="topbar-status">Warehouse Control Center</div>
      </div>
    </div>
  </div>

  <div class="topbar-right">
    <div class="user-profile">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-text">
        <span id="userInfo">Загрузка...</span>
        <span id="userRoleInfo">---</span>
      </div>
    </div>
    <button class="btn-logout" id="btnLogout">Выйти</button>
  </div>
</header>

<main class="container">
  <section class="page-head">
    <div>
      <h1 class="page-title">Панель управления WMS</h1>
      <div class="page-subtitle">
        Быстрый доступ к складским операциям, справочникам, интеграциям и отчётам.
      </div>
    </div>
    <div class="page-meta" id="pageMeta">Загрузка данных пользователя...</div>
  </section>

  <div id="menu-container"></div>
</main>

<script>
  const sections = [
    { id: 'operations', icon: '📦', label: 'Складские операции', desc: 'Ежедневные процессы обработки товаров и заказов' },
    { id: 'directories', icon: '📂', label: 'Склад и справочники', desc: 'Управление номенклатурой, ячейками и контрагентами' },
    { id: 'marketplaces', icon: '🌐', label: 'Маркетплейсы', desc: 'Синхронизация и работа с внешними торговыми площадками' },
    { id: 'analytics', icon: '📈', label: 'Отчёты', desc: 'Анализ эффективности и выгрузка складских данных' },
    { id: 'admin', icon: '⚙️', label: 'Администрирование', desc: 'Системные настройки, заявки и управление пользователями' }
  ];

  const modules = [
    { code: 'receiving', section: 'operations', icon: '📥', label: 'Приёмка', desc: 'Оформление входящих поставок и первичный пересчет товаров.', href: '/receiving.html' },
    { code: 'picking', section: 'operations', icon: '🛒', label: 'Сборка', desc: 'Задания на отбор товаров со стеллажей для заказов.', href: '/picking.html' },
    { code: 'packing', section: 'operations', icon: '📦', label: 'Упаковка', desc: 'Контроль собранного, упаковка в короба и печать стикеров.', href: '/packing.html' },
    { code: 'shipping', section: 'operations', icon: '🚚', label: 'Отгрузка', desc: 'Закрытие поставок и передача логистическим службам.', href: '/shipping.html' },
    { code: 'inventory', section: 'operations', icon: '⚖️', label: 'Инвентаризация', desc: 'Задания на пересчет и выравнивание стока.', href: '/inventory-tasks.html' },

    { code: 'stock_overview', section: 'directories', icon: '🔎', label: 'Обзор склада', desc: 'Просмотр остатков в реальном времени по всем ячейкам.', href: '/stock-overview.html' },
    { code: 'locations', section: 'directories', icon: '📍', label: 'Места хранения', desc: 'Управление ячейками, перемещение и топология склада.', href: '/locations.html' },
    { code: 'items', section: 'directories', icon: '🏷️', label: 'Справочник товаров', desc: 'Общий справочник номенклатуры, штрихкодов и габаритов.', href: '/items-directory.html' },
    { code: 'clients', section: 'directories', icon: '👥', label: 'Клиенты', desc: 'Управление владельцами товара и контрагентами.', href: '/clients-directory.html' },

    { code: 'mp_accounts', section: 'marketplaces', icon: '🔑', label: 'MP Аккаунты', desc: 'Настройка API-ключей доступа к Wildberries и др.', href: '/mp-accounts.html' },
    { code: 'mp_wb_items', section: 'marketplaces', icon: '🟣', label: 'Справочник WB', desc: 'Сопоставление карточек Wildberries с товарами WMS.', href: '/mp-wb-items.html' },
    { code: 'mp_wb_orders', section: 'marketplaces', icon: '🛒', label: 'WB Заказы', desc: 'Мониторинг сборочных заданий из кабинета Wildberries.', href: '/wb-orders.html' },

    { code: 'shipments_board', section: 'analytics', icon: '🖥️', label: 'Табло отгрузок', desc: 'Экран мониторинга для зоны экспедиции и отгрузки.', href: '/shipments-board.html' },
    { code: 'stock_report', section: 'analytics', icon: '📁', label: 'Отчёт по складу', desc: 'Экспорт текущих остатков в формате Excel/CSV.', href: '/stock-report.html' },
    { code: 'receiving_report', section: 'analytics', icon: '📋', label: 'Отчёт по приёмке', desc: 'История и детали всех принятых товаров за период.', href: '/receiving-report.html' },
    { code: 'public_receiving', section: 'analytics', icon: '🌐', label: 'Публичная приёмка', desc: 'Отчёт для внешних клиентов без прямой авторизации.', href: '/publicreceiving-report.html' },

    { code: 'admin_users', section: 'admin', icon: '👤', label: 'Пользователи', desc: 'Управление сотрудниками, ролями и правами доступа.', href: '/admin-users.html' },
    { code: 'seller_users', section: 'admin', icon: '🧑‍💼', label: 'Селлеры', desc: 'Создание логинов и паролей для селлеров, привязка к клиенту и управление доступом в кабинет.', href: '/seller-users.html', badge: 'Новый' },
    { code: 'leads', section: 'admin', icon: '📝', label: 'Заявки', desc: 'Входящие обращения с сайта, статусы, комментарии и планы по клиентам.', href: '/leads.html', badge: 'Новый' },
    { code: 'admin_tools', section: 'admin', icon: '🛠️', label: 'Сервис-инструменты', desc: 'Админка WB, очистка логов и технические настройки.', href: '/admin-tools.html' },
    { code: 'printer_panel', section: 'admin', icon: '🖨️', label: 'Панель принтеров', desc: 'Управление принтерами, маршрутами печати и очередью заданий.', href: '/printer-panel.html', badge: 'Новый' },
    { code: 'wb_stock_control', section: 'admin', icon: '📡', label: 'WB FBS остатки', desc: 'Синхронизация складов WB, пересчёт распределения, dry-run и отправка остатков в WB.', href: '/wb-stock-control.html', badge: 'Новый' }
  ];

  const rolePermissions = {
    owner: ['*'],
    admin: ['*'],
    warehouse: ['receiving', 'picking', 'packing', 'shipping'],
    picker: ['picking'],
    packer: ['packing'],
    shipper: ['shipping', 'shipments_board'],
    manager: ['stock_overview', 'stock_report', 'receiving_report', 'items', 'clients']
  };

  function parseJwt(token) {
    try {
      const parts = String(token || '').split('.');
      if (parts.length < 2) return null;

      const base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
      const padded = base64 + '='.repeat((4 - (base64.length % 4)) % 4);
      return JSON.parse(atob(padded));
    } catch (e) {
      return null;
    }
  }

  function getStoredToken() {
    return (
      localStorage.getItem('token') ||
      localStorage.getItem('authToken') ||
      sessionStorage.getItem('token') ||
      sessionStorage.getItem('authToken') ||
      localStorage.getItem('wmsToken') ||
      ''
    );
  }

  function getStoredUser() {
    const rawUser =
      localStorage.getItem('wmsUser') ||
      localStorage.getItem('user') ||
      '';

    if (!rawUser) return null;

    try {
      return JSON.parse(rawUser);
    } catch (e) {
      return rawUser;
    }
  }

  function getUserData() {
    const token = getStoredToken();
    const jwt = parseJwt(token);
    const fallbackUser = getStoredUser();

    const role =
      jwt?.role ||
      localStorage.getItem('wmsRole') ||
      localStorage.getItem('role') ||
      'guest';

    const username =
      jwt?.username ||
      jwt?.login ||
      jwt?.user ||
      (fallbackUser && (fallbackUser.username || fallbackUser.login || fallbackUser.name)) ||
      (typeof fallbackUser === 'string' ? fallbackUser : null) ||
      'unknown';

    return { username, role, token };
  }

  function clearAuthAndRedirect() {
    localStorage.removeItem('token');
    localStorage.removeItem('authToken');
    localStorage.removeItem('role');

    localStorage.removeItem('user');
    localStorage.removeItem('wmsToken');
    localStorage.removeItem('wmsRole');
    localStorage.removeItem('wmsUser');

    sessionStorage.removeItem('token');
    sessionStorage.removeItem('authToken');

    window.location.href = '/login.html';
  }

  function getAllowedModules(role) {
    const allowed = rolePermissions[role] || [];
    return {
      allowed,
      isFullAccess: allowed.includes('*')
    };
  }

  function getBadgeClass(badge) {
    if (badge === 'Скоро') return 'badge badge-soon';
    if (badge === 'Новый') return 'badge badge-new';
    if (badge === 'Есть задания') return 'badge badge-tasks';
    return 'badge';
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function createCardHtml(moduleItem) {
    const badgeHtml = moduleItem.badge
      ? `<span class="${getBadgeClass(moduleItem.badge)}">${escapeHtml(moduleItem.badge)}</span>`
      : '';

    return `
      <a href="${moduleItem.href}" class="menu-card section-${moduleItem.section}" data-module="${moduleItem.code}">
        <div class="card-head">
          <span class="card-icon">${moduleItem.icon}</span>
          <div class="card-title-wrap">
            <div class="card-title-line">
              <span class="card-title">${escapeHtml(moduleItem.label)}</span>
              ${badgeHtml}
            </div>
          </div>
        </div>
        <span class="card-desc">${escapeHtml(moduleItem.desc)}</span>
        <div class="card-meta">
          <span class="card-module-code">${escapeHtml(moduleItem.code)}</span>
        </div>
        <span class="card-arrow">→</span>
      </a>
    `;
  }

  function createSectionHtml(sectionItem, sectionModules) {
    return `
      <section class="section" id="section-${sectionItem.id}">
        <div class="section-header">
          <h2 class="section-title">
            ${sectionItem.icon} ${escapeHtml(sectionItem.label)}
          </h2>
          <div class="section-desc">${escapeHtml(sectionItem.desc)}</div>
        </div>
        <div class="menu-grid">
          ${sectionModules.map((moduleItem) => createCardHtml(moduleItem)).join('')}
        </div>
      </section>
    `;
  }

  function renderHeaderUser(username, role) {
    document.getElementById('userInfo').textContent = username;
    document.getElementById('userRoleInfo').textContent = `Роль: ${role}`;

    const avatar = document.getElementById('userAvatar');
    avatar.textContent = String(username || '?').trim().charAt(0).toUpperCase() || '?';

    const pageMeta = document.getElementById('pageMeta');
    pageMeta.textContent = `Текущий пользователь: ${username} • Роль: ${role}`;
  }

  function renderMenu() {
    const { username, role, token } = getUserData();

    if (!token) {
      clearAuthAndRedirect();
      return;
    }

    const payload = parseJwt(token);
    if (!payload) {
      clearAuthAndRedirect();
      return;
    }

    const { allowed, isFullAccess } = getAllowedModules(role);
    const container = document.getElementById('menu-container');
    container.innerHTML = '';

    let renderedSections = 0;

    sections.forEach((sectionItem) => {
      const sectionModules = modules.filter((moduleItem) => {
        return moduleItem.section === sectionItem.id &&
          (isFullAccess || allowed.includes(moduleItem.code));
      });

      if (sectionModules.length > 0) {
        container.insertAdjacentHTML('beforeend', createSectionHtml(sectionItem, sectionModules));
        renderedSections += 1;
      }
    });

    if (renderedSections === 0) {
      container.innerHTML = `
        <div class="empty-state">
          Для вашей роли пока не назначены доступные модули. Обратитесь к администратору системы.
        </div>
      `;
    }

    renderHeaderUser(username, role);
  }

  function setupLogout() {
    const btn = document.getElementById('btnLogout');
    if (!btn) return;

    btn.addEventListener('click', () => {
      if (confirm('Вы точно хотите выйти из системы?')) {
        clearAuthAndRedirect();
      }
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderMenu();
    setupLogout();
  });
</script>

</body>
</html>
